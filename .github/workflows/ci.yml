name: CI

on:
  push:
    branches:
      - codex/release-polish
      - main
      - master
  pull_request:
    branches:
      - codex/release-polish
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
